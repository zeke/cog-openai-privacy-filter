model: zeke/openai-privacy-filter
test_hardware: gpu-t4
predict:
  compare_outputs: false
  predict_timeout: 300
  test_cases:
    - inputs:
        text: "My name is Alice Smith and my email is alice.smith@example.com"
      match_prompt: "The redacted_text should replace 'Alice Smith' and the email address with placeholder labels like [PRIVATE_PERSON] and [PRIVATE_EMAIL]"
    - inputs:
        text: "Call me at +1 (415) 555-0124. My address is 123 Main St, San Francisco, CA 94105."
      match_prompt: "The output should include detected spans for a phone number and an address"
    - inputs:
        text: "The project deadline is June 15, 2026. Contact Jordan at jordan@corp.io. His API key is sk-abc123def456."
      match_prompt: "The output should detect a person name (Jordan), an email, and a secret/API key"
    - inputs:
        text: "No personal information here. Just a regular sentence about the weather."
      match_prompt: "The output should have an empty or near-empty spans array since there is no PII in this text"
  fuzz:
    fixed_inputs:
      aggregation_strategy: simple
    disabled_inputs: []
    iterations: 10
    prompt: "Generate realistic text snippets that contain various types of PII: names, emails, phone numbers, addresses, dates, account numbers, API keys, and passwords. Mix in non-PII context. Vary between formal emails, chat messages, log entries, and code comments."
