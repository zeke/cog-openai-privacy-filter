model: zeke/openai-privacy-filter
test_hardware: gpu-t4-nano
predict:
  compare_outputs: true
  predict_timeout: 300
  test_cases:
    - inputs:
        text: "My name is Alice Smith and my email is alice.smith@example.com"
      match_prompt: "The output should contain redacted_text with [PRIVATE_PERSON] replacing 'Alice Smith' and [PRIVATE_EMAIL] replacing the email address"
    - inputs:
        text: "Call me at +1 (415) 555-0124. My address is 123 Main St, San Francisco, CA 94105."
      match_prompt: "The output should redact a phone number and an address"
    - inputs:
        text: "The project deadline is June 15, 2026. Contact Jordan at jordan@corp.io. His API key is sk-abc123def456."
      match_prompt: "The output should detect and redact a person name, a date, an email, and a secret/API key"
    - inputs:
        text: "OpenAI released GPT-5.5 on April 23, 2026."
        output_mode: typed
      match_prompt: "Public entity names like OpenAI and product names like GPT-5.5 should NOT be redacted. The date may or may not be redacted depending on context."
    - inputs:
        text: "No personal information here. Just a regular sentence about the weather."
      match_prompt: "The output should have no detected spans since there is no PII in this text"
  fuzz:
    fixed_inputs:
      output_mode: typed
      decode_mode: viterbi
    disabled_inputs: []
    iterations: 10
    prompt: "Generate realistic text snippets that contain various types of PII: names, emails, phone numbers, addresses, dates of birth, account numbers, API keys, and passwords. Mix in non-PII context. Vary between formal emails, chat messages, log entries, and code comments."
