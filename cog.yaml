build:
  gpu: true
  python_version: "3.12"
  python_packages:
    - "torch==2.6.0"
    - "safetensors>=0.5.0"
    - "tiktoken>=0.8.0"
    - "numpy"
    - "huggingface_hub>=0.26.0"
    - "packaging"
    - "tqdm"
  run:
    - "pip install git+https://github.com/openai/privacy-filter.git"
predict: "predict.py:Predictor"
image: "r8.im/zeke/openai-privacy-filter"
